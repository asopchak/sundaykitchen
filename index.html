e",prep:"tough outer layers removed; tender core minced fine"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"3 minced for the marinade, 3 for the nuoc cham"},{item:"fish sauce",qty:4,kind:"volume",unit:"tbsp",cat:"sauce",prep:"1 Tbsp for the marinade, 3 for the nuoc cham"},{item:"lime",qty:4,kind:"count",cat:"produce",prep:"juiced"},{item:"cucumber",qty:2,kind:"count",cat:"produce",prep:"ribboned with a peeler"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"ribboned with a peeler"},{item:"mint",qty:1,kind:"bunch",cat:"produce",prep:"leaves torn"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"roughly chopped"},{item:"Thai chili",qty:2,kind:"count",cat:"spice",prep:"sliced thin \u2014 baseline; scale to your heat"},{item:"black pepper",qty:.5,kind:"volume",unit:"tsp",cat:"spice",prep:"for the marinade"}],method:["Marinate the pork in the lemongrass, minced garlic, 1 Tbsp fish sauce, and the pepper, 20 min.","Make a savory nuoc cham: 3 Tbsp fish sauce, the lime juice, remaining garlic, sliced chili, and ~\xBD cup water to balance (no sugar).","Sear the pork hard in a single layer, in batches \u2014 crowding steams it; a proper char is the whole point of b\xFAn.","Build bowls: vermicelli, pork, ribboned cucumber and carrot, herbs; dress at serving. Best fresh, holds 2 days."]},{id:"l-tortillasoup",name:"Chicken Tortilla Soup",meal:"Lunch",cuisine:"Mexican",storage:"Freezer",prep:35,serves:5,macros:{p:74,f:9,c:40,kcal:530,sugar:5,fiber:6},brands:["Tomatoes: Muir Glen Fire-Roasted","Chipotles: La Coste\xF1a"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"left whole to poach, then shredded"},{item:"black beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"fire-roasted diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"frozen corn",qty:200,kind:"weight",unit:"g",cat:"produce"},{item:"chipotles in adobo",qty:1,kind:"can",cat:"sauce",prep:"1\u20132 chiles minced; freeze the rest of the can"},{item:"carton (32 oz) low-sodium chicken broth",qty:1,kind:"count",cat:"pantry"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"corn tortillas",qty:5,kind:"count",cat:"grains",prep:"sliced into thin strips"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"chili powder",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 low-sodium broth needs it"}],method:["Simmer the chicken in the broth with the tomatoes, chipotle, onion, garlic, cumin, chili powder, and salt, ~15 min; shred and return.","Add the beans and corn; simmer 10 min. Freeze the soup.","Bake the tortilla strips at 200\xB0C/400\xB0F until crisp, ~8 min; top each bowl with strips, lime, and cilantro to serve."]},{id:"l-paprikash",name:"Chicken Paprikash",meal:"Lunch",cuisine:"Hungarian",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:10,c:35,kcal:520,sugar:5,fiber:3},brands:["Paprika: Szeged sweet Hungarian"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"nonfat Greek yogurt",qty:300,kind:"weight",unit:"g",cat:"dairy",prep:"at room temperature so it doesn't seize in the sauce"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:2,kind:"count",cat:"produce",prep:"finely diced"},{item:"large red bell pepper",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"yukon gold potato",qty:4,kind:"count",cat:"produce",prep:"peeled and quartered, boiled alongside"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"sweet Hungarian paprika",qty:3,kind:"volume",unit:"tbsp",cat:"spice",prep:"yes, that much \u2014 paprika is the dish; keep it fresh"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Soften the onion and pepper in the oil with 1 tsp of the salt. Pull the pan OFF the heat to stir in the paprika and garlic \u2014 paprika scorches and turns bitter in seconds over direct heat.","Add the tomatoes, chicken, remaining salt, and a splash of water; simmer 20 min, with the potatoes boiling alongside.","Off the heat, stir in the Greek yogurt (don't boil it). Freeze the chicken-and-sauce; stir fresh yogurt in when you reheat so it stays smooth."]},{id:"l-dorowat",name:"Ethiopian Doro Wat-Style Chicken",meal:"Lunch",cuisine:"Ethiopian",storage:"Freezer",prep:45,serves:5,macros:{p:74,f:10,c:30,kcal:500,sugar:4,fiber:3},brands:["Berbere: Brundo or Mama Fresh"],ingredients:[{item:"chicken breast",qty:1550,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"tomato paste",qty:3,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"yellow onion",qty:3,kind:"count",cat:"produce",prep:"finely diced \u2014 a food processor is fair game here"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"jasmine rice",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"lemon",qty:1,kind:"count",cat:"produce",prep:"juiced at the end"},{item:"berbere spice",qty:2.5,kind:"volume",unit:"tbsp",cat:"spice",prep:"baseline \u2014 real doro wat uses more; scale to your heat"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 some berbere blends carry salt, so taste first"}],method:["Cook the onions down slowly in a dry pot (the traditional way \u2014 no oil yet) with 1 tsp of the salt until deeply jammy, 20+ min. This is the base; be patient.","Add the oil, berbere, garlic, ginger, and tomato paste; toast 2 min until brick-red and fragrant.","Add the chicken, remaining salt, and 2 cups water; simmer 25 min until thick. Brighten with the lemon juice. Freeze.","Serve over rice (or with a little injera)."]},{id:"l-minestrone",name:"Chicken Minestrone",meal:"Lunch",cuisine:"Italian",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:8,c:42,kcal:540,sugar:5,fiber:8},brands:["Broth: Swanson Low-Sodium"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"cut into bite-size pieces"},{item:"cannellini beans",qty:1,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"ditalini or other small pasta",qty:125,kind:"weight",unit:"g",cat:"grains",prep:"cooked fresh at reheat, never frozen in the soup"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"carton (32 oz) low-sodium chicken broth",qty:1,kind:"count",cat:"pantry"},{item:"carrot",qty:2,kind:"count",cat:"produce",prep:"diced"},{item:"celery",qty:2,kind:"stalk",cat:"produce",prep:"diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"zucchini",qty:1,kind:"count",cat:"produce",prep:"diced; added late so it stays green"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"dried basil",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried oregano",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 low-sodium broth needs it"}],method:["Soften the soffritto \u2014 carrot, celery, onion \u2014 in the oil with 1 tsp of the salt until sweet, ~8 min; add the garlic, basil, and oregano for the last 30 seconds.","Add the broth, tomatoes, beans, chicken, and remaining salt; simmer 20 min, adding the zucchini for the last 5.","Freeze the soup base. Cook the pasta fresh when reheating so it doesn't go mushy."]},{id:"d-bbqchicken",name:"BBQ Pulled Chicken",meal:"Dinner",cuisine:"American / BBQ",storage:"Freezer",prep:45,serves:5,macros:{p:76,f:10,c:30,kcal:528,sugar:2,fiber:8},brands:["BBQ: G Hughes Sugar-Free Hickory","Beans: any pinto"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"left whole for the low-and-slow roast"},{item:"sugar-free BBQ sauce",qty:250,kind:"weight",unit:"g",cat:"sauce"},{item:"pinto beans",qty:2,kind:"can",cat:"pantry",prep:"drained, liquid from one can reserved"},{item:"small green cabbage",qty:1,kind:"count",cat:"produce",prep:"shredded fine"},{item:"carrot",qty:2,kind:"count",cat:"produce",prep:"coarsely grated"},{item:"apple cider vinegar",qty:3,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"Dijon mustard",qty:1,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"smoked paprika",qty:1,kind:"volume",unit:"tbsp",cat:"spice"},{item:"garlic powder",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"onion powder",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"2 tsp in the rub, \xBD tsp for the slaw"},{item:"black pepper",qty:1,kind:"volume",unit:"tsp",cat:"spice"}],method:["Rub the chicken with the smoked paprika, garlic powder, onion powder, 2 tsp of the salt, and half the pepper; roast covered at 160\xB0C/325\xB0F ~35 min \u2014 low and covered is what lets lean breast shred instead of drying out.","Shred with two forks and fold in the BBQ sauce plus a splash of the pan juices. Freezes very well.","Make a savory slaw: toss the cabbage and carrot with the vinegar, Dijon, remaining \xBD tsp salt, and the rest of the pepper \u2014 no sugar.","Warm the pinto beans and serve alongside."]},{id:"d-bolognese",name:"Turkey Bolognese",meal:"Dinner",cuisine:"Italian",storage:"Freezer",prep:40,serves:5,macros:{p:74,f:6,c:50,kcal:587,sugar:6,fiber:5},brands:["Tomatoes: San Marzano-style crushed"],ingredients:[{item:"99% lean ground turkey",qty:1500,kind:"weight",unit:"g",cat:"protein"},{item:"canned crushed tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"whole-wheat pasta",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"cooked fresh to serve; save a cup of pasta water"},{item:"carrot",qty:2,kind:"count",cat:"produce",prep:"finely grated so it melts into the sauce"},{item:"celery",qty:2,kind:"stalk",cat:"produce",prep:"finely grated or minced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely grated or minced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"skim milk",qty:4,kind:"volume",unit:"tbsp",cat:"dairy",prep:"the classic Bolognese softener \u2014 it mellows the acidity"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"dried oregano",qty:1.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried basil",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp in the sauce, \xBD tsp for the pasta water"}],method:["Brown the turkey with the grated carrot, celery, onion, and 1\xBD tsp of the salt in the oil, breaking it up fine.","Add the garlic, oregano, basil, and tomato paste; toast 1 min. Add the milk and let it absorb, then the crushed tomatoes; simmer 25 min.","Freeze the sauce; boil the pasta fresh and loosen the sauce with a splash of pasta water to serve."]},{id:"d-coqauvin",name:"Coq au Vin-Style Chicken",meal:"Dinner",cuisine:"French",storage:"Freezer",prep:50,serves:5,macros:{p:75,f:9,c:28,kcal:505,sugar:3,fiber:3},brands:["Wine: any dry red"],ingredients:[{item:"chicken breast",qty:1550,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks; patted dry for a real sear"},{item:"cremini mushrooms",qty:350,kind:"weight",unit:"g",cat:"produce",prep:"halved (quartered if large)"},{item:"pearl onions",qty:250,kind:"weight",unit:"g",cat:"produce",prep:"frozen-and-peeled are fine and save 20 minutes"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"cut into thick coins"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"dry red wine",qty:250,kind:"volume",unit:"ml",cat:"pantry",prep:"one you'd drink"},{item:"tomato paste",qty:1,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"yukon gold potato",qty:3,kind:"count",cat:"produce",prep:"peeled and quartered, boiled to serve"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Season the chicken with 1 tsp of the salt; brown hard in the oil and set aside. Saut\xE9 the mushrooms undisturbed until browned, then add the pearl onions and carrot.","Add the garlic and tomato paste and toast 1 min; pour in the wine and reduce by half \u2014 cooking the wine down properly is what keeps it winey, not sour. Add the thyme, bay, remaining salt, the chicken, and a little water; braise gently 25\u201330 min.","Freeze. Serve with boiled potatoes. (Keep the simmer gentle so the breast stays tender.)"]},{id:"d-greencurry",name:"Thai Green Curry Chicken",meal:"Dinner",cuisine:"Thai",storage:"Freezer",prep:35,serves:5,macros:{p:75,f:13,c:44,kcal:570,sugar:5,fiber:4},brands:["Curry paste: Maesri green","Coconut milk: Aroy-D Lite"],ingredients:[{item:"chicken breast",qty:1475,kind:"weight",unit:"g",cat:"protein",prep:"sliced \xBC-inch thick against the grain"},{item:"cornstarch",qty:2,kind:"volume",unit:"tsp",cat:"pantry",prep:"to velvet the chicken"},{item:"light coconut milk",qty:350,kind:"volume",unit:"ml",cat:"pantry",prep:"don't shake \u2014 spoon the thick cream off the top for frying the paste"},{item:"Thai green curry paste",qty:5,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"Thai or globe eggplant",qty:2,kind:"count",cat:"produce",prep:"cut into 1-inch chunks"},{item:"zucchini",qty:1,kind:"count",cat:"produce",prep:"sliced into half-moons"},{item:"green beans",qty:200,kind:"weight",unit:"g",cat:"produce",prep:"trimmed, halved"},{item:"fish sauce",qty:3,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries the seasoning \u2014 no added salt needed"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"juiced at the end, off the heat"},{item:"Thai basil",qty:1,kind:"bunch",cat:"produce",prep:"leaves picked"},{item:"jasmine rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"}],method:["Velvet the chicken: toss the slices with the cornstarch and 1 Tbsp water; rest 10 min \u2014 it keeps lean breast silky in the simmer.","Fry the green curry paste in 2 Tbsp of the thick coconut cream until it splits and smells toasty.","Add the chicken and the rest of the coconut milk; simmer gently, then add the eggplant, zucchini, and green beans until just tender.","Season with fish sauce and lime \u2014 no sugar. Freeze the curry; cook rice fresh and finish with Thai basil."]},{id:"d-tandoori",name:"Tandoori Chicken with Saag",meal:"Dinner",cuisine:"Indian",storage:"Fridge",prep:40,serves:5,macros:{p:78,f:12,c:45,kcal:565,sugar:6,fiber:5},brands:["Spices: Rani","Yogurt: Fage Total 0%"],ingredients:[{item:"chicken breast",qty:1375,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets; scored so the marinade grips"},{item:"nonfat Greek yogurt",qty:400,kind:"weight",unit:"g",cat:"dairy",prep:"half for the marinade, half stirred into the saag"},{item:"frozen chopped spinach",qty:1e3,kind:"weight",unit:"g",cat:"produce",prep:"no need to thaw"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"grated \u2014 half for the marinade, half for the saag"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and grated, split the same way"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"basmati rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"1 juiced into the marinade, 1 in wedges"},{item:"garam masala",qty:1,kind:"volume",unit:"tbsp",cat:"spice",prep:"for the marinade"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"for the saag"},{item:"ground turmeric",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"sweet paprika",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"for color in the marinade"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp marinade, 1\xBD tsp saag"}],method:["Marinate the chicken in half the yogurt with the garam masala, paprika, half the ginger and garlic, the lemon juice, and 1 tsp of the salt \u2014 30 min minimum; the yogurt's acidity is what makes tandoori tender.","Broil or air-fry the chicken hot until charred at the edges; rest 5 min and slice.","Saag: soften the onion in the oil, add the remaining ginger and garlic, the cumin and turmeric, then the tomatoes, spinach, and remaining salt; simmer 12 min. Stir in the rest of the yogurt OFF the heat so it stays creamy instead of splitting.","Serve the chicken over the saag with basmati. Holds 3\u20134 days."]},{id:"d-piccata",name:"Chicken Piccata",meal:"Dinner",cuisine:"Italian",storage:"Fridge",prep:30,serves:5,macros:{p:75,f:12,c:28,kcal:500,sugar:2,fiber:2},brands:["Capers: Maille"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"halved horizontally and pounded to an even \xBD inch"},{item:"capers",qty:4,kind:"volume",unit:"tbsp",cat:"pantry",prep:"drained"},{item:"lemon",qty:3,kind:"count",cat:"produce",prep:"2 juiced, 1 sliced thin into the sauce"},{item:"dry white wine",qty:150,kind:"volume",unit:"ml",cat:"pantry"},{item:"unsalted butter",qty:2.5,kind:"volume",unit:"tsp",cat:"dairy",prep:"cold \u2014 swirled in off the heat to gloss the sauce"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"all-purpose flour",qty:3,kind:"volume",unit:"tbsp",cat:"grains",prep:"for dusting \u2014 shake off the excess"},{item:"garlic",qty:3,kind:"clove",cat:"produce",prep:"minced"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"whole-wheat pasta",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"cooked fresh; save a splash of pasta water"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp for the cutlets, \xBD tsp for the pasta water \u2014 capers salt the sauce"},{item:"black pepper",qty:.5,kind:"volume",unit:"tsp",cat:"spice"}],method:["Season the cutlets with 1\xBD tsp of the salt and the pepper, dust lightly with the flour, and sear in the oil until golden \u2014 the flour crust is what thickens the pan sauce later.","Deglaze with the wine, scraping up the browned bits; add the lemon juice, lemon slices, garlic, and capers and reduce by half. Off the heat, swirl in the cold butter until the sauce goes glossy.","Finish with parsley; serve over a little pasta. Best fresh; holds 2\u20133 days."]},{id:"l-medbowl",name:"Mediterranean Chicken & Chickpea Bowl",meal:"Lunch",cuisine:"Mediterranean",storage:"Fridge",prep:30,serves:5,macros:{p:76,f:11,c:33,kcal:537,sugar:4,fiber:9},brands:["Chickpeas: any (simmer 10 min with a pinch of baking soda for creamier texture)"],ingredients:[{item:"chicken breast",qty:1350,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"chickpeas",qty:2,kind:"can",cat:"pantry",prep:"drained, rinsed, and patted very dry so they crisp"},{item:"cucumber",qty:2,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"large tomato",qty:3,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"medium red onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced \u2014 one for the salad, one for the yogurt"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"2 minced for the chicken, 2 grated into the yogurt"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"nonfat Greek yogurt",qty:300,kind:"weight",unit:"g",cat:"dairy",prep:"for the sauce"},{item:"dried oregano",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp chicken, \xBD tsp chickpeas, \xBD tsp salad"}],method:["Season the chicken with the oregano, minced garlic, and 1 tsp of the salt; sear, rest 5 min, and dice.","Crisp the chickpeas in a little of the oil with \xBD tsp salt until golden and popping \u2014 drying them first is the secret.","Toss the cucumber, tomato, onion, and parsley with one lemon's juice, the remaining oil, and \xBD tsp salt. Thin the yogurt with the other lemon and the grated garlic.","Combine chicken, chickpeas, and salad; spoon over the yogurt. Holds 3\u20134 days (dress the salad day-of)."]},{id:"l-fattoush",name:"Chicken Fattoush Salad",meal:"Lunch",cuisine:"Lebanese",storage:"Fresh",prep:25,serves:5,macros:{p:74,f:13,c:25,kcal:500,sugar:4,fiber:5},brands:["Sumac: any Middle Eastern brand"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"romaine",qty:2,kind:"head",cat:"produce",prep:"chopped into ribbons"},{item:"cucumber",qty:2,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"large tomato",qty:3,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"radish",qty:1,kind:"bunch",cat:"produce",prep:"sliced thin"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"roughly chopped"},{item:"mint",qty:1,kind:"bunch",cat:"produce",prep:"leaves torn"},{item:"whole-wheat pita",qty:3,kind:"count",cat:"grains",prep:"torn into chip-size pieces"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"lemon",qty:3,kind:"count",cat:"produce",prep:"juiced"},{item:"garlic",qty:3,kind:"clove",cat:"produce",prep:"finely grated into the dressing"},{item:"sumac",qty:1,kind:"volume",unit:"tbsp",cat:"spice",prep:"half in the dressing, half dusted over \u2014 it's the signature sour note"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp chicken, 1 tsp dressing"}],method:["Season the chicken with 1 tsp of the salt and grill or sear; rest 5 min and slice. Bake the pita at 200\xB0C/400\xB0F until crisp, ~8 min.","Whisk the dressing: lemon juice, oil, grated garlic, half the sumac, and the remaining salt.","Toss the romaine, cucumber, tomato, radish, parsley, and mint with the dressing; top with chicken, pita chips, and the rest of the sumac.","Best assembled day-of \u2014 keep components separate and they hold 3 days."]},{id:"l-chinesebroccoli",name:"Chinese Chicken & Broccoli",meal:"Lunch",cuisine:"Chinese",storage:"Fridge",prep:25,serves:5,macros:{p:74,f:11,c:42,kcal:555,sugar:2,fiber:4},brands:["Soy: Kikkoman Less Sodium"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"sliced \xBC-inch thick against the grain"},{item:"broccoli",qty:3,kind:"head",cat:"produce",prep:"cut into bite-size florets; stems peeled and sliced"},{item:"jasmine rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"low-sodium soy sauce",qty:5,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries most of the seasoning"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"cornstarch",qty:1,kind:"volume",unit:"tbsp",cat:"pantry",prep:"1 tsp to velvet the chicken, the rest for the slurry"},{item:"peanut or vegetable oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"thinly sliced"},{item:"kosher salt",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline for the broccoli and rice \u2014 the soy does the rest"}],method:["Velvet the chicken: toss the slices with 1 tsp cornstarch, 1 Tbsp of the soy, and 1 Tbsp water; rest 10 min. This keeps lean breast silky instead of dry.","Sear the chicken in batches in a ripping-hot pan with most of the oil until just cooked; remove.","Stir-fry the broccoli with the garlic, ginger, and salt; add a splash of water and cover 2 min to steam-crisp.","Return the chicken; add the remaining soy and a slurry of the remaining cornstarch + 3 Tbsp cold water; toss 30 seconds to glaze. Serve over rice with scallion. Holds 3 days."]},{id:"l-turkishbulgur",name:"Turkish Chicken & Bulgur Pilaf",meal:"Lunch",cuisine:"Turkish",storage:"Freezer",prep:40,serves:5,macros:{p:74,f:11,c:40,kcal:555,sugar:5,fiber:6},brands:["Pepper paste: \xD6nc\xFC or Tat biber sal\xE7as\u0131"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"coarse bulgur",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"coarse (#3) grind holds its bite; fine bulgur turns mushy"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"Turkish pepper paste (biber sal\xE7as\u0131)",qty:3,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"large red bell pepper",qty:2,kind:"count",cat:"produce",prep:"diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"Aleppo pepper (or mild red pepper flakes)",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried mint",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"rubbed on at the end \u2014 heat dulls it"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 pepper paste carries some salt, so taste first"}],method:["Season the chicken with 1 tsp of the salt and brown; set aside. Saut\xE9 the pepper and onion, then add the garlic, pepper paste, and cumin and toast 1 min until brick-red.","Add the tomatoes, chicken, remaining salt, and a splash of water; simmer until saucy.","Cook the bulgur and fold together. Freeze; reheat and finish with the dried mint and Aleppo pepper."]},{id:"l-shrimptaco",name:"Shrimp & Black Bean Taco Bowl",meal:"Lunch",cuisine:"Mexican",storage:"Fresh",prep:20,serves:5,macros:{p:75,f:6,c:40,kcal:520,sugar:3,fiber:8},brands:["Tortillas: Mission"],ingredients:[{item:"raw shrimp, peeled",qty:1650,kind:"weight",unit:"g",cat:"protein",prep:"patted very dry so the spices stick"},{item:"black beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"corn tortillas",qty:10,kind:"count",cat:"grains",prep:"warmed in a dry skillet"},{item:"small green cabbage",qty:1,kind:"count",cat:"produce",prep:"shredded fine"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"1 for the slaw, 1 for the crema, 1 in wedges"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"jalape\xF1o",qty:1,kind:"count",cat:"produce",prep:"sliced thin; seeded for less heat"},{item:"nonfat Greek yogurt",qty:150,kind:"weight",unit:"g",cat:"dairy",prep:"thinned with lime for the crema"},{item:"chili powder",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"smoked paprika",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp shrimp, \xBD tsp slaw"}],method:["Toss the shrimp with the chili powder, cumin, paprika, and 1 tsp of the salt; sear in a hot pan 3\u20134 min until pink and C-shaped.","Toss the cabbage and onion with a lime's juice and \xBD tsp salt for the slaw; warm the beans; thin the yogurt with another lime for the crema.","Build bowls or tacos with shrimp, slaw, beans, crema, jalape\xF1o, and cilantro. Cook shrimp fresh; eat within 2\u20133 days."]},{id:"l-whitechili",name:"White Chicken Chili",meal:"Lunch",cuisine:"Tex-Mex",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:8,c:35,kcal:500,sugar:3,fiber:7},brands:["Green chiles: Hatch","Broth: Swanson Low-Sodium"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"left whole to poach, then shredded"},{item:"great northern beans",qty:2,kind:"can",cat:"pantry",prep:"drained; mash half of one can for body"},{item:"canned diced green chiles",qty:2,kind:"can",cat:"pantry"},{item:"carton (32 oz) low-sodium chicken broth",qty:1,kind:"count",cat:"pantry"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"lime",qty:2,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"nonfat Greek yogurt",qty:150,kind:"weight",unit:"g",cat:"dairy",prep:"a dollop per bowl, off the heat"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried oregano",qty:1.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 low-sodium broth needs it"}],method:["Simmer the chicken in the broth with the onion, garlic, green chiles, cumin, oregano, and salt, ~15 min; shred and return.","Stir in the mashed and whole beans; simmer until creamy \u2014 the mashed beans thicken it without any cream.","Freeze in portions; finish each bowl with lime, cilantro, and a dollop of yogurt."]},{id:"d-veracruz",name:"Cod Veracruz",meal:"Dinner",cuisine:"Mexican",storage:"Fresh",prep:30,serves:5,macros:{p:76,f:10,c:40,kcal:545,sugar:5,fiber:3},brands:["Jalape\xF1os: La Coste\xF1a"],ingredients:[{item:"cod or other white fish",qty:2e3,kind:"weight",unit:"g",cat:"protein",prep:"cut into 5 portions; patted dry"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"sliced"},{item:"green olives",qty:24,kind:"count",cat:"pantry",prep:"pitted, halved"},{item:"capers",qty:3,kind:"volume",unit:"tbsp",cat:"pantry",prep:"drained"},{item:"jar of pickled jalape\xF1os",qty:1,kind:"count",cat:"pantry",prep:"use ~\u2153 jar, sliced, plus 1 Tbsp of the brine"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"white rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"dried oregano (Mexican if you have it)",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 olives, capers, and brine carry plenty, so taste first"}],method:["Soften the onion and garlic in the oil; add the tomatoes, olives, capers, jalape\xF1os and brine, bay, oregano, and 1 tsp of the salt; simmer 12 min. (The sauce freezes well on its own.)","Season the cod with the remaining \xBD tsp salt, nestle into the sauce, and spoon some over; cover and simmer gently 8\u201310 min until it just flakes \u2014 pull it early, it keeps cooking off the heat.","Serve over white rice with cilantro. Cook the fish the day you eat it."]},{id:"d-scallops",name:"Seared Scallops, White Beans & Greens",meal:"Dinner",cuisine:"Coastal Italian",storage:"Fresh",prep:30,serves:5,macros:{p:75,f:10,c:20,kcal:445,sugar:2,fiber:6},brands:["Scallops: dry-packed sea scallops","Beans: Cento cannellini"],ingredients:[{item:"dry sea scallops",qty:1600,kind:"weight",unit:"g",cat:"protein",prep:"side muscle pulled off; patted VERY dry \u2014 'dry-packed' scallops sear, wet-packed ones steam"},{item:"cannellini beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained, liquid reserved"},{item:"bag of baby spinach",qty:1,kind:"count",cat:"produce"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"sliced"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"red pepper flakes",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp scallops (just before searing), \xBD tsp beans"}],method:["Warm the beans with the garlic, \xBD tsp of the salt, and a splash of their liquid; mash lightly into a soft bed and wilt in the spinach.","Salt the scallops just before cooking (salting early draws out moisture) and sear hard in a ripping-hot pan, 1\xBD min per side, untouched, until deeply golden.","Plate scallops over the beans and greens; finish with lemon, parsley, and chili. Cook fresh."]},{id:"d-piripiri",name:"Portuguese Piri-Piri Chicken",meal:"Dinner",cuisine:"Portuguese",storage:"Fridge",prep:35,serves:5,macros:{p:75,f:10,c:26,kcal:480,sugar:2,fiber:3},brands:["Piri-piri: Nando's PERi-PERi"],ingredients:[{item:"chicken breast",qty:1550,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets; scored so the marinade grips"},{item:"piri-piri sauce",qty:6,kind:"volume",unit:"tbsp",cat:"sauce",prep:"4 Tbsp to marinate, 2 to serve"},{item:"garlic",qty:8,kind:"clove",cat:"produce",prep:"peeled, into the blender"},{item:"red wine vinegar",qty:4,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"1 juiced into the marinade, 1 in wedges"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"yukon gold potato",qty:5,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"smoked paprika",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp in the marinade, 1 tsp on the potatoes"}],method:["Blend 4 Tbsp piri-piri with the garlic, paprika, vinegar, lemon juice, oil, and 1\xBD tsp of the salt; marinate the chicken 30 min (overnight is better).","Roast or grill hot, basting with the marinade, until charred and cooked through; roast the potato wedges alongside with the remaining salt.","Serve with extra sauce and parsley. Holds 3 days."]},{id:"d-caribcurry",name:"Caribbean Curry Chicken",meal:"Dinner",cuisine:"Caribbean",storage:"Freezer",prep:45,serves:5,macros:{p:74,f:10,c:36,kcal:540,sugar:3,fiber:3},brands:["Curry powder: Betapac Jamaican"],ingredients:[{item:"chicken breast",qty:1550,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"yukon gold potato",qty:3,kind:"count",cat:"produce",prep:"cut into 1\xBD-inch chunks \u2014 they thicken the gravy as they break down"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"scotch bonnet",qty:1,kind:"count",cat:"produce",prep:"left WHOLE and fished out at the end \u2014 flavor without the full burn; mince it in if you want fire"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"long-grain rice",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"sliced"},{item:"Jamaican curry powder",qty:2,kind:"volume",unit:"tbsp",cat:"spice"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground allspice",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 some Jamaican curry powders carry salt, so taste first"}],method:["Burn the curry: bloom the curry powder in the oil until it darkens a shade and smells toasty \u2014 the classic Jamaican first step. Add the onion, garlic, ginger, whole scotch bonnet, thyme, and allspice.","Add the chicken, potato, salt, and water to barely cover; simmer 30 min until thick and tender. Remove the scotch bonnet. Freeze.","Serve over rice with scallion."]},{id:"d-mapo",name:"Sichuan Mapo-Style Turkey & Tofu",meal:"Dinner",cuisine:"Chinese",storage:"Freezer",prep:30,serves:5,macros:{p:75,f:12,c:35,kcal:560,sugar:3,fiber:3},brands:["Chili bean paste: Pixian (Juan Cheng) doubanjiang"],ingredients:[{item:"99% lean ground turkey",qty:1400,kind:"weight",unit:"g",cat:"protein"},{item:"extra-firm tofu",qty:500,kind:"weight",unit:"g",cat:"protein",prep:"cut into \xBE-inch cubes; slid in gently so they stay whole"},{item:"doubanjiang (spicy fermented bean paste)",qty:4,kind:"volume",unit:"tbsp",cat:"sauce",prep:"salty \u2014 it seasons the whole dish"},{item:"low-sodium soy sauce",qty:3,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"toasted sesame oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce",prep:"off the heat at the end"},{item:"cornstarch",qty:1,kind:"volume",unit:"tbsp",cat:"pantry",prep:"whisked with 3 Tbsp cold water for the slurry"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"thinly sliced"},{item:"jasmine rice",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"Sichuan peppercorns",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"toasted in a dry pan, then ground \u2014 this is the numbing m\xE1; don't skip the toast"},{item:"red pepper flakes or ground Sichuan chili",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 scale to your heat"}],method:["Brown the turkey; add the doubanjiang, garlic, ginger, chili, and half the ground Sichuan pepper and fry until the oil stains red and it smells fragrant.","Add 1\xBD cups water, the soy, and the tofu; simmer gently 8 min without hard stirring, then thicken with the slurry.","Finish with sesame oil and scallion. Freeze; serve over rice. (Tofu turns pleasantly chewier after freezing.)"]},{id:"d-codplaki",name:"Greek Baked Cod Plaki",meal:"Dinner",cuisine:"Greek",storage:"Fresh",prep:35,serves:5,macros:{p:75,f:8,c:32,kcal:495,sugar:5,fiber:3},brands:["Tomatoes: any quality canned"],ingredients:[{item:"cod or other white fish",qty:2e3,kind:"weight",unit:"g",cat:"protein",prep:"cut into 5 portions; patted dry"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:2,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"sliced"},{item:"large tomato",qty:2,kind:"count",cat:"produce",prep:"sliced into rounds to blanket the fish"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"white rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced over at the end"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"dried oregano",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp sauce, 1 tsp fish"}],method:["Soften the onions slowly in the oil until sweet, ~10 min \u2014 plaki lives on well-cooked onions. Add the garlic, diced tomatoes, oregano, and 1 tsp of the salt; simmer 10 min (this sauce freezes well).","Spread the sauce in a dish; season the cod with the remaining salt, lay it on top, blanket with the tomato slices, and bake at 200\xB0C/400\xB0F ~18 min until it just flakes.","Finish with lemon and parsley; serve over rice. Cook the fish day-of."]},{id:"l-posolerojo",name:"Chicken Pozole Rojo",meal:"Lunch",cuisine:"Mexican",storage:"Freezer",prep:50,serves:5,macros:{p:75,f:9,c:26,kcal:472,sugar:3,fiber:4},brands:["Hominy: Juanita's or Teasdale"],ingredients:[{item:"chicken breast",qty:1600,kind:"weight",unit:"g",cat:"protein",prep:"left whole to poach, then shredded"},{item:"white hominy",qty:2,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"dried guajillo and ancho chiles",qty:8,kind:"count",cat:"pantry",prep:"stemmed and seeded"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"half for the blender, half diced to serve"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"peeled"},{item:"small green cabbage",qty:1,kind:"count",cat:"produce",prep:"shredded"},{item:"radish",qty:1,kind:"bunch",cat:"produce",prep:"sliced thin"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"dried oregano (Mexican if you have it)",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"plus more to crumble over bowls"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Toast the chiles in a dry pan 30 seconds per side until fragrant \u2014 don't let them blacken or the broth goes bitter \u2014 then soak in hot water 15 min and blend with the onion half, garlic, and a cup of the soaking water. Strain for a silkier broth.","Poach the chicken in 5 cups water with 1\xBD tsp of the salt; shred. Simmer the red sauce in the poaching broth with the oregano, cumin, and remaining salt; return the chicken, add the hominy, and cook 15 min. Freeze.","Serve topped with shredded cabbage, radish, lime, and oregano."]},{id:"l-westafrican",name:"West African Chicken & Black-Eyed Pea Stew",meal:"Lunch",cuisine:"Nigerian",storage:"Freezer",prep:45,serves:5,macros:{p:75,f:11,c:30,kcal:520,sugar:5,fiber:7},brands:["Black-eyed peas: Goya","Bouillon: Maggi"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"black-eyed peas",qty:2,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"large red bell pepper",qty:2,kind:"count",cat:"produce",prep:"rough-chopped for the blender"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"rough-chopped for the blender"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"peeled"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled"},{item:"scotch bonnet",qty:1,kind:"count",cat:"produce",prep:"stemmed; seeded for less heat"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"vegetable oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"curry powder",qty:1,kind:"volume",unit:"tbsp",cat:"spice"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bouillon powder (Maggi-style)",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"the signature seasoning \u2014 it's salty, so taste before adding salt"},{item:"kosher salt",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline on top of the bouillon"}],method:["Blend the tomatoes, peppers, onion, ginger, and scotch bonnet into a base. Fry it in the oil with the tomato paste, curry powder, and thyme until it darkens and thickens, 10\u201312 min \u2014 frying the blended base down is the West African step that makes the stew taste rich, not raw.","Add the chicken, black-eyed peas, bouillon, salt, and a cup of water; simmer 25 min.","Taste, adjust, and freeze in portions."]},{id:"l-turkeysausagebeans",name:"Tuscan Turkey-Sausage & White Beans",meal:"Lunch",cuisine:"Italian",storage:"Freezer",prep:35,serves:5,macros:{p:75,f:8,c:30,kcal:500,sugar:4,fiber:8},brands:["Beans: Cento cannellini"],ingredients:[{item:"99% lean ground turkey",qty:1500,kind:"weight",unit:"g",cat:"protein"},{item:"cannellini beans",qty:2,kind:"can",cat:"pantry",prep:"drained, liquid from one can reserved"},{item:"lacinato kale",qty:1,kind:"bunch",cat:"produce",prep:"stemmed and chopped"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"fennel seed",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"lightly crushed \u2014 this is what makes lean turkey taste like Italian sausage"},{item:"red pepper flakes",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"smoked paprika",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Brown the turkey with the onion, fennel seed, pepper flakes, paprika, garlic, and 1 tsp of the salt \u2014 the crushed fennel is the sausage trick.","Add the tomatoes, beans with the reserved liquid, and remaining salt; simmer 10 min, then stir in the kale until tender.","Freeze in portions."]},{id:"l-harira",name:"Moroccan Harira",meal:"Lunch",cuisine:"Moroccan",storage:"Freezer",prep:45,serves:5,macros:{p:75,f:9,c:40,kcal:560,sugar:5,fiber:10},brands:["Any canned chickpeas and lentils"],ingredients:[{item:"chicken breast",qty:1350,kind:"weight",unit:"g",cat:"protein",prep:"cut into bite-size pieces"},{item:"red lentils",qty:125,kind:"weight",unit:"g",cat:"pantry",prep:"rinsed"},{item:"chickpeas",qty:2,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"celery",qty:2,kind:"stalk",cat:"produce",prep:"finely diced, leaves included \u2014 traditional in harira"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"half stirred in, half to serve"},{item:"lemon",qty:1,kind:"count",cat:"produce",prep:"juiced at the end"},{item:"ground ginger",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground turmeric",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cinnamon",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Sweat the onion and celery in the oil with 1 tsp of the salt; add the ginger, turmeric, cinnamon, cumin, and tomato paste and bloom 1 min.","Add the tomatoes, lentils, chickpeas, chicken, remaining salt, and 5 cups water; simmer 25 min until the lentils melt into the broth.","Stir in half the cilantro and the lemon juice off the heat; top bowls with the rest. Freeze in portions."]},{id:"d-jalfrezi",name:"Chicken Jalfrezi",meal:"Dinner",cuisine:"Indian",storage:"Freezer",prep:40,serves:5,macros:{p:74,f:11,c:42,kcal:575,sugar:5,fiber:4},brands:["Spices: Rani or Deep"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"large bell pepper",qty:2,kind:"count",cat:"produce",prep:"cut into 1-inch squares"},{item:"yellow onion",qty:2,kind:"count",cat:"produce",prep:"1 diced fine for the sauce, 1 in chunky petals for the stir-fry"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"green chili",qty:2,kind:"count",cat:"produce",prep:"sliced; seeded for less heat"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"basmati rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground coriander",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground turmeric",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"garam masala",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"stirred in at the end \u2014 it's a finishing spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Season the chicken with 1 tsp of the salt and sear; set aside. Stir-fry the pepper squares and onion petals in a very hot pan until charred at the edges but still crisp \u2014 jalfrezi is a stir-fried curry; the char and bite are the point.","Add the ginger, garlic, chili, cumin, coriander, and turmeric; bloom 30 seconds, add the tomatoes and remaining salt, return the chicken, and cook to a thick, dryish curry. Stir in the garam masala at the end.","Freeze; cook basmati fresh to serve."]},{id:"d-massaman",name:"Thai Massaman Chicken Curry",meal:"Dinner",cuisine:"Thai",storage:"Freezer",prep:45,serves:5,macros:{p:74,f:13,c:44,kcal:580,sugar:5,fiber:4},brands:["Paste: Maesri Massaman","Coconut milk: Aroy-D Lite"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"light coconut milk",qty:400,kind:"volume",unit:"ml",cat:"pantry",prep:"don't shake \u2014 spoon the thick cream off the top for frying the paste"},{item:"massaman curry paste",qty:5,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"yukon gold potato",qty:3,kind:"count",cat:"produce",prep:"cut into 1\xBD-inch chunks"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"roasted peanuts",qty:3,kind:"volume",unit:"tbsp",cat:"pantry",prep:"crushed, to top"},{item:"fish sauce",qty:2,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries the seasoning"},{item:"jasmine rice",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"lime",qty:2,kind:"count",cat:"produce",prep:"juiced at the end \u2014 massaman needs its sour edge since we skip the palm sugar"},{item:"cinnamon stick",qty:1,kind:"count",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"}],method:["Fry the paste in 2 Tbsp of the thick coconut cream until it splits and smells toasty; add the chicken, the rest of the coconut milk, the cinnamon stick, and bay.","Add the potato and onion; simmer gently 25 min until the potatoes are tender and the sauce has body. Season with the fish sauce and lime; fish out the cinnamon and bay.","Freeze; cook rice fresh and top with a few crushed peanuts and lime."]},{id:"d-cottagepie",name:"Turkey Cottage Pie",meal:"Dinner",cuisine:"British",storage:"Freezer",prep:50,serves:5,macros:{p:76,f:7,c:40,kcal:585,sugar:6,fiber:6},brands:["Worcestershire: Lea & Perrins"],ingredients:[{item:"99% lean ground turkey",qty:1600,kind:"weight",unit:"g",cat:"protein"},{item:"russet or yukon gold potato",qty:1e3,kind:"weight",unit:"g",cat:"produce",prep:"peeled, cut into even chunks"},{item:"skim milk",qty:100,kind:"volume",unit:"ml",cat:"dairy",prep:"warmed \u2014 cold milk makes gluey mash"},{item:"frozen peas",qty:200,kind:"weight",unit:"g",cat:"produce"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:3,kind:"clove",cat:"produce",prep:"minced"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"Worcestershire sauce",qty:2,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"carton (32 oz) low-sodium broth",qty:1,kind:"count",cat:"pantry",prep:"use about half; save the rest"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp filling, 1 tsp mash"}],method:["Brown the turkey with the carrot, onion, garlic, and 1\xBD tsp of the salt; stir in the tomato paste and toast 1 min. Add the Worcestershire, thyme, bay, about half the broth, and the peas; simmer to a thick gravy and remove the bay.","Boil the potatoes in salted water until tender; mash with the warm milk and 1 tsp salt. Spread over the filling and rough the top with a fork \u2014 the ridges are what crisp up.","Bake at 200\xB0C/400\xB0F for 20 min. Cool and portion \u2014 it freezes and reheats well."]},{id:"d-gumbo",name:"Chicken & Okra Gumbo",meal:"Dinner",cuisine:"Creole",storage:"Freezer",prep:50,serves:5,macros:{p:74,f:12,c:40,kcal:560,sugar:4,fiber:5},brands:["Cajun: Tony Chachere's"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"frozen cut okra",qty:400,kind:"weight",unit:"g",cat:"produce",prep:"no need to thaw"},{item:"large green bell pepper",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"celery",qty:3,kind:"stalk",cat:"produce",prep:"diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"all-purpose flour",qty:4,kind:"volume",unit:"tbsp",cat:"grains",prep:"for the roux"},{item:"vegetable oil",qty:4,kind:"volume",unit:"tbsp",cat:"sauce",prep:"for the roux"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"long-grain rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"sliced"},{item:"Cajun seasoning",qty:2,kind:"volume",unit:"tbsp",cat:"spice",prep:"most blends are salty \u2014 taste before adding salt"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline on top of the Cajun blend"}],method:["Make the roux: whisk the oil and flour over medium heat, stirring constantly, until peanut-butter brown, 8\u201310 min \u2014 it smells nutty when it's ready, and it can't be rushed. Add the trinity (pepper, celery, onion) to stop the roux darkening, then the garlic, Cajun seasoning, and thyme.","Add the tomatoes, 4 cups water, bay, salt, chicken, and okra; simmer 30 min \u2014 the okra thickens it as it goes. Remove the bay.","Freeze; serve over rice with scallion."]},{id:"l-burritobowl",name:"Chicken Burrito Bowl",meal:"Lunch",cuisine:"Mexican",storage:"Fridge",prep:30,serves:5,macros:{p:76,f:9,c:50,kcal:575,sugar:4,fiber:9},brands:["Beans: any black beans"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"long-grain rice",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"black beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"frozen corn",qty:150,kind:"weight",unit:"g",cat:"produce"},{item:"large tomato",qty:3,kind:"count",cat:"produce",prep:"diced, seeds shaken out so the pico isn't watery"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"1 into the rice, 2 into the pico"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped \u2014 half for the rice, half for the pico"},{item:"garlic",qty:3,kind:"clove",cat:"produce",prep:"minced"},{item:"jalape\xF1o",qty:1,kind:"count",cat:"produce",prep:"minced; seeded for less heat"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"chili powder",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"smoked paprika",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp chicken, \xBD tsp rice, \xBD tsp pico"}],method:["Rub the chicken with the cumin, chili powder, paprika, garlic, and 1 tsp of the salt; grill or sear, rest 5 min, slice. Cook the rice with \xBD tsp salt; fold in a lime's juice and half the cilantro.","Warm the beans and corn. Make the pico: tomato, onion, jalape\xF1o, the remaining lime juice, cilantro, and \xBD tsp salt \u2014 let it sit 10 min so the flavors marry.","Build bowls with rice, chicken, beans, corn, and pico. Holds 3\u20134 days (pico best added day-of)."]},{id:"l-farrosalad",name:"Mediterranean Chicken & Farro Salad",meal:"Lunch",cuisine:"Mediterranean",storage:"Fridge",prep:30,serves:5,macros:{p:75,f:12,c:40,kcal:560,sugar:4,fiber:7},brands:["Feta: Mt Vikos"],ingredients:[{item:"chicken breast",qty:1400,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"farro",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"cooked like pasta in plenty of salted water, then drained"},{item:"cucumber",qty:2,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"large tomato",qty:3,kind:"count",cat:"produce",prep:"chopped chunky"},{item:"medium red onion",qty:1,kind:"count",cat:"produce",prep:"finely diced; soak 5 min in cold water to tame the bite"},{item:"feta",qty:75,kind:"weight",unit:"g",cat:"dairy",prep:"crumbled"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced"},{item:"garlic",qty:3,kind:"clove",cat:"produce",prep:"finely grated into the dressing"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"dried oregano",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp chicken, \xBD tsp farro water, \xBD tsp dressing \u2014 feta adds more"}],method:["Cook the farro in salted water until chewy-tender; drain. Season the chicken with 1 tsp of the salt and half the oregano; sear, rest, and slice.","Whisk the lemon juice, oil, garlic, remaining oregano, and \xBD tsp salt; toss with the cucumber, tomato, onion, and parsley.","Fold in the warm farro (it drinks up the dressing while warm), then the chicken and feta. Holds 4 days."]},{id:"d-roastchicken",name:"Garlic-Herb Roast Chicken & Potatoes",meal:"Dinner",cuisine:"American",storage:"Fridge",prep:45,serves:5,macros:{p:74,f:10,c:30,kcal:510,sugar:2,fiber:5},brands:["Any"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"baby potatoes",qty:800,kind:"weight",unit:"g",cat:"produce",prep:"halved, cut-side down on the tray for browning"},{item:"green beans",qty:400,kind:"weight",unit:"g",cat:"produce",prep:"trimmed"},{item:"garlic",qty:8,kind:"clove",cat:"produce",prep:"smashed, skins on \u2014 they roast into sweet nubs"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"1 juiced over the tray, 1 in wedges"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"dried rosemary",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"crushed in your palm"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"sweet paprika",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"},{item:"black pepper",qty:.5,kind:"volume",unit:"tsp",cat:"spice"}],method:["Toss the chicken, potatoes, and green beans with the garlic, rosemary, thyme, paprika, oil, lemon juice, salt, and pepper. Give the potatoes a 10-min head start on the tray \u2014 they take longest.","Add the chicken and roast at 220\xB0C/425\xB0F ~18 min more, pulling the green beans a few minutes early so they stay bright. Rest the chicken 5 min before slicing.","Holds 3\u20134 days; reheats well."]},{id:"d-chimichurri",name:"Pork Tenderloin with Chimichurri & Rice",meal:"Dinner",cuisine:"Argentine",storage:"Fridge",prep:35,serves:5,macros:{p:74,f:13,c:30,kcal:535,sugar:2,fiber:2},brands:["Any"],ingredients:[{item:"pork tenderloin",qty:1800,kind:"weight",unit:"g",cat:"protein",prep:"silverskin trimmed; patted dry"},{item:"flat-leaf parsley",qty:2,kind:"bunch",cat:"produce",prep:"finely chopped by hand \u2014 a blender turns chimichurri to paste"},{item:"fresh oregano",qty:1,kind:"bunch",cat:"produce",prep:"leaves finely chopped"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"minced"},{item:"red wine vinegar",qty:4,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"long-grain rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"lemon",qty:1,kind:"count",cat:"produce",prep:"juiced into the chimichurri"},{item:"red pepper flakes",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp pork, \xBD tsp chimichurri, \xBD tsp rice"}],method:["Season the tenderloins with 1\xBD tsp of the salt; sear on all sides, then roast to 63\xB0C/145\xB0F. Rest 8 min before slicing \u2014 145\xB0F plus a real rest keeps it blush-pink and juicy.","Make the chimichurri: stir the parsley, oregano, and garlic with the vinegar, lemon, oil, pepper flakes, and \xBD tsp salt; let it sit 10 min so it melds.","Serve the pork over rice with plenty of chimichurri. Holds 3\u20134 days."]},{id:"l-gheymeh",name:"Persian Chicken & Split Pea Stew (Gheymeh)",meal:"Lunch",cuisine:"Persian",storage:"Freezer",prep:50,serves:5,macros:{p:75,f:10,c:30,kcal:500,sugar:4,fiber:7},brands:["Dried limes: Sadaf"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"yellow split peas",qty:150,kind:"weight",unit:"g",cat:"pantry",prep:"rinsed"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"dried limes (limoo amani)",qty:3,kind:"count",cat:"pantry",prep:"pierced a few times with a knife so they perfume the stew"},{item:"vegetable oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"ground turmeric",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cinnamon",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"added after the peas soften"}],method:["Saut\xE9 the onion in the oil until golden; add the turmeric, cinnamon, and cumin and bloom 30 seconds, then brown the chicken in the spiced oil.","Add the tomato paste, tomatoes, split peas, dried limes, and 4 cups water; simmer 35 min until the peas are tender. Press the limes against the pot as they soften to release their sour depth, then add the salt.","Freeze in portions. (Traditionally crowned with shoestring fries \u2014 add fresh if you like.)"]},{id:"l-caryga",name:"Vietnamese Chicken Curry (C\xE0 Ri G\xE0)",meal:"Lunch",cuisine:"Vietnamese",storage:"Freezer",prep:45,serves:5,macros:{p:74,f:12,c:42,kcal:575,sugar:5,fiber:4},brands:["Coconut: Aroy-D Lite","Curry powder: Vianco"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"light coconut milk",qty:400,kind:"volume",unit:"ml",cat:"pantry",prep:"shaken well"},{item:"lemongrass",qty:3,kind:"stalk",cat:"produce",prep:"bruised with the back of a knife and cut into 3-inch lengths \u2014 fish out before serving"},{item:"yukon gold potato",qty:3,kind:"count",cat:"produce",prep:"cut into 1\xBD-inch chunks"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"cut into thick coins"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"fish sauce",qty:2,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries the seasoning"},{item:"jasmine rice",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"Madras-style curry powder",qty:2,kind:"volume",unit:"tbsp",cat:"spice",prep:"half on the chicken, half in the pot"}],method:["Toss the chicken with half the curry powder and let it sit 10 min \u2014 a dry curry marinade is the c\xE0 ri g\xE0 signature. Sear, then set aside and saut\xE9 the lemongrass, garlic, ginger, and onion with the remaining curry powder.","Return the chicken; add the coconut milk, 1 cup water, carrot, and potato; simmer 25 min and season with the fish sauce. Fish out the lemongrass.","Freeze; cook rice fresh to serve."]},{id:"l-picadillo",name:"Cuban Picadillo",meal:"Lunch",cuisine:"Cuban",storage:"Freezer",prep:35,serves:5,macros:{p:75,f:12,c:35,kcal:575,sugar:5,fiber:4},brands:["Any green olives and capers"],ingredients:[{item:"99% lean ground turkey",qty:1650,kind:"weight",unit:"g",cat:"protein"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"green olives",qty:30,kind:"count",cat:"pantry",prep:"pitted, halved \u2014 with a splash of their brine"},{item:"capers",qty:2,kind:"volume",unit:"tbsp",cat:"pantry",prep:"drained"},{item:"large green bell pepper",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"tomato paste",qty:2,kind:"volume",unit:"tbsp",cat:"pantry"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"long-grain rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried oregano",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 olives, brine, and capers do a lot, so taste at the end"}],method:["Brown the turkey with 1 tsp of the salt; add the pepper, onion, and garlic and soften \u2014 this sofrito is the base of picadillo.","Stir in the tomato paste and toast 1 min; add the tomatoes, olives and brine, capers, cumin, oregano, and bay; simmer 15 min. Taste before the last \xBD tsp salt. Remove the bay.","Freeze; serve over rice."]},{id:"d-lentejas",name:"Spanish Lentil & Chicken Stew (Lentejas)",meal:"Dinner",cuisine:"Spanish",storage:"Freezer",prep:45,serves:5,macros:{p:75,f:9,c:42,kcal:540,sugar:5,fiber:11},brands:["Paprika: Piment\xF3n de la Vera"],ingredients:[{item:"chicken breast",qty:1400,kind:"weight",unit:"g",cat:"protein",prep:"left whole to simmer, then shredded"},{item:"brown or green lentils",qty:200,kind:"weight",unit:"g",cat:"pantry",prep:"rinsed and picked over"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"sliced into coins"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"large red bell pepper",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"smoked paprika (piment\xF3n)",qty:1,kind:"volume",unit:"tbsp",cat:"spice",prep:"off the heat when it goes in \u2014 it scorches fast"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"added AFTER the lentils soften \u2014 salting early keeps them firm"}],method:["Saut\xE9 the onion, pepper, carrot, and garlic in the oil; pull the pot off the heat to stir in the piment\xF3n and cumin so they bloom without burning.","Add the tomatoes, lentils, bay, chicken, and 5 cups water; simmer 30 min until the lentils are tender. Now add the salt, shred the chicken back in, and remove the bay.","Freeze in portions."]},{id:"d-japcurry",name:"Japanese Chicken Curry",meal:"Dinner",cuisine:"Japanese",storage:"Freezer",prep:45,serves:5,macros:{p:74,f:11,c:44,kcal:575,sugar:5,fiber:4},brands:["Curry powder: S&B Oriental"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"yukon gold potato",qty:3,kind:"count",cat:"produce",prep:"cut into 1\xBD-inch chunks"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"cut into rolling wedges (rangiri) \u2014 more surface, better sauce cling"},{item:"yellow onion",qty:2,kind:"count",cat:"produce",prep:"thinly sliced so they melt into the sauce"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"grated"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and grated"},{item:"all-purpose flour",qty:3,kind:"volume",unit:"tbsp",cat:"grains",prep:"for the curry roux"},{item:"vegetable oil",qty:4,kind:"volume",unit:"tsp",cat:"sauce"},{item:"carton (32 oz) low-sodium broth",qty:1,kind:"count",cat:"pantry"},{item:"low-sodium soy sauce",qty:1,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"jasmine rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"S&B-style Japanese curry powder",qty:2,kind:"volume",unit:"tbsp",cat:"spice"},{item:"kosher salt",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 soy finishes the seasoning"}],method:["Season the chicken with the salt and brown; set aside. Saut\xE9 the onions until golden and soft, then the carrot, garlic, and ginger.","Push everything aside; make the roux in the empty side \u2014 oil, flour, and curry powder, stirred 2 min until sandy and fragrant (a homemade version of the curry brick). Whisk in the broth, add the chicken and potato, and simmer 20 min until thick enough to coat rice. Season with the soy.","Freeze; cook rice fresh to serve."]},{id:"d-caldoverde",name:"Portuguese Caldo Verde",meal:"Dinner",cuisine:"Portuguese",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:9,c:36,kcal:540,sugar:3,fiber:8},brands:["Paprika: Piment\xF3n","Beans: any"],ingredients:[{item:"99% lean ground turkey",qty:1550,kind:"weight",unit:"g",cat:"protein"},{item:"great northern or cannellini beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"russet or yukon gold potato",qty:600,kind:"weight",unit:"g",cat:"produce",prep:"peeled and chunked \u2014 they get mashed into the broth"},{item:"collard greens",qty:1,kind:"bunch",cat:"produce",prep:"stemmed, rolled, and sliced into the thinnest ribbons you can manage \u2014 the signature cut"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp"
