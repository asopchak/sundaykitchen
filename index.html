osher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp marinade, \xBD tsp tzatziki, \xBD tsp salad"}],method:["Marinate the cubes in one lemon's juice, the minced garlic, oregano, oil, and 1 tsp of the salt, 20+ min; grill or sear hot until charred at the corners. Cook the rice.","Make the tzatziki: yogurt, the squeezed grated cucumber (squeezing is what keeps it thick), grated garlic, dill, the other lemon, and \xBD tsp salt. Toss the tomato, chopped cucumber, and onion with the last \xBD tsp.","Assemble bowls. Holds 3\u20134 days; keep tzatziki separate."]},{id:"l-chipotlelime",name:"Chipotle-Lime Chicken & Rice",meal:"Lunch",cuisine:"Tex-Mex",storage:"Fridge",prep:30,serves:5,macros:{p:76,f:8,c:50,kcal:575,sugar:4,fiber:9},brands:["Chipotles: La Coste\xF1a"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"long-grain rice",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"black beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"frozen corn",qty:150,kind:"weight",unit:"g",cat:"produce"},{item:"chipotle peppers in adobo",qty:3,kind:"volume",unit:"tbsp",cat:"sauce",prep:"chiles + sauce, blended into the marinade"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"2 juiced into the marinade, 1 in wedges"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"peeled, into the blender"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"smoked paprika",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1\xBD tsp marinade, \xBD tsp rice"}],method:["Blend the chipotles, lime juice, garlic, cumin, paprika, and 1\xBD tsp of the salt; marinate the chicken 20+ min, then sear or grill until charred, rest, and slice.","Cook the rice with \xBD tsp salt; warm the beans and corn with the diced onion.","Build bowls with cilantro and lime. Holds 3\u20134 days."]},{id:"l-lemonpepper",name:"Lemon-Pepper Chicken & Quinoa",meal:"Lunch",cuisine:"American",storage:"Fridge",prep:30,serves:5,macros:{p:75,f:11,c:38,kcal:560,sugar:3,fiber:7},brands:["Any"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"quinoa",qty:225,kind:"weight",unit:"g",cat:"grains",prep:"rinsed well \u2014 the coating (saponin) tastes bitter if you skip it"},{item:"broccoli",qty:2,kind:"head",cat:"produce",prep:"cut into florets"},{item:"zucchini",qty:2,kind:"count",cat:"produce",prep:"sliced into thick half-moons"},{item:"lemon",qty:3,kind:"count",cat:"produce",prep:"zested and juiced \u2014 the zest is where lemon-pepper lives"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"black pepper",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"coarsely ground \u2014 be generous, it's the point"},{item:"sweet paprika",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp chicken, \xBD tsp quinoa, \xBD tsp vegetables"}],method:["Season the chicken with the lemon zest, black pepper, paprika, and 1 tsp of the salt; sear or roast, rest, and slice. Cook the quinoa with \xBD tsp salt.","Roast the broccoli and zucchini with the garlic, oil, and remaining salt at 220\xB0C/425\xB0F until charred at the edges.","Toss everything with the lemon juice and parsley. Holds 4 days."]},{id:"d-greeklemon",name:"Greek Chicken with Lemon Potatoes & Green Beans",meal:"Dinner",cuisine:"Greek",storage:"Fridge",prep:50,serves:5,macros:{p:74,f:10,c:30,kcal:510,sugar:3,fiber:5},brands:["Any"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets"},{item:"yukon gold potato",qty:5,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"green beans",qty:400,kind:"weight",unit:"g",cat:"produce",prep:"trimmed"},{item:"lemon",qty:3,kind:"count",cat:"produce",prep:"juiced \u2014 the potatoes drink it up as they roast"},{item:"garlic",qty:8,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"dried oregano",qty:1,kind:"volume",unit:"tbsp",cat:"spice",prep:"Greek if you have it \u2014 be generous"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"},{item:"black pepper",qty:.5,kind:"volume",unit:"tsp",cat:"spice"}],method:["Toss the potatoes with most of the lemon juice, half the garlic and oregano, the oil, and 1\xBD tsp of the salt; add \xBD cup water to the pan \u2014 steam-roasting in lemony liquid is the Greek-potato secret. Roast at 200\xB0C/400\xB0F 20 min.","Season the chicken with the remaining garlic, oregano, salt, and pepper; add to the pan with the green beans and roast ~18 min more. Finish with the last of the lemon.","Holds 3\u20134 days; reheats well."]},{id:"d-dirtyrice",name:"Blackened Chicken & Dirty-Rice-Lite",meal:"Dinner",cuisine:"Cajun",storage:"Fridge",prep:35,serves:5,macros:{p:75,f:10,c:42,kcal:560,sugar:2,fiber:3},brands:["Cajun: Tony Chachere's"],ingredients:[{item:"chicken breast",qty:1350,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets; patted very dry so the blackening crust sticks"},{item:"99% lean ground turkey",qty:250,kind:"weight",unit:"g",cat:"protein",prep:"stands in for the traditional giblets in the rice"},{item:"long-grain rice",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"large green bell pepper",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"celery",qty:2,kind:"stalk",cat:"produce",prep:"finely diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"finely diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"carton (32 oz) low-sodium broth",qty:1,kind:"count",cat:"pantry",prep:"use ~2\xBD cups for the rice"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"sliced"},{item:"Cajun seasoning",qty:2.5,kind:"volume",unit:"tbsp",cat:"spice",prep:"1\xBD Tbsp to blacken the chicken, 1 Tbsp in the rice \u2014 salty, so no added salt needed"},{item:"dried thyme",qty:1,kind:"volume",unit:"tsp",cat:"spice"}],method:["Coat the chicken in 1\xBD Tbsp of the Cajun seasoning and sear HARD in a dry, screaming-hot pan \u2014 blackening is controlled char; open a window. Rest and slice.","Brown the turkey with the trinity, garlic, thyme, and remaining Cajun seasoning; add the rice and 2\xBD cups broth and cook covered until fluffy, ~18 min.","Serve the chicken over the dirty rice with scallion. Holds 3\u20134 days."]},{id:"d-pollobrasa",name:"Peruvian Pollo a la Brasa with Aji Verde",meal:"Dinner",cuisine:"Peruvian",storage:"Fridge",prep:45,serves:5,macros:{p:75,f:10,c:28,kcal:500,sugar:3,fiber:4},brands:["Aji panca: Do\xF1a Isabel","Yogurt: Fage 0%"],ingredients:[{item:"chicken breast",qty:1550,kind:"weight",unit:"g",cat:"protein",prep:"halved into even cutlets; scored so the marinade grips"},{item:"nonfat Greek yogurt",qty:200,kind:"weight",unit:"g",cat:"dairy",prep:"the aji verde base \u2014 stands in for mayo"},{item:"cilantro",qty:2,kind:"bunch",cat:"produce",prep:"stems and all, into the blender"},{item:"jalape\xF1o",qty:2,kind:"count",cat:"produce",prep:"stemmed; seeded for less heat"},{item:"garlic",qty:8,kind:"clove",cat:"produce",prep:"5 for the marinade, 3 for the aji verde"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"2 juiced into the marinade, 1 into the sauce"},{item:"low-sodium soy sauce",qty:2,kind:"volume",unit:"tbsp",cat:"sauce",prep:"the secret of the classic brasa marinade"},{item:"aji panca paste",qty:2,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"yukon gold potato",qty:5,kind:"count",cat:"produce",prep:"cut into wedges"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"smoked paprika",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"1 tsp marinade (soy adds more), 1 tsp potatoes"}],method:["Marinate the chicken in the cumin, paprika, 5 cloves garlic, soy, aji panca, 2 limes' juice, and 1 tsp of the salt \u2014 overnight if you can; the soy-vinegar-spice soak is what makes brasa taste like brasa. Roast or grill hot until charred; roast the potatoes alongside with the remaining salt.","Blend the aji verde: cilantro, jalape\xF1os, 3 cloves garlic, the last lime, yogurt, and a little oil until smooth and green.","Slice the chicken and serve with the aji verde. Holds 3\u20134 days (sauce keeps 4 days)."]},{id:"l-fasolada",name:"Greek Chicken & White Bean Soup (Fasolada)",meal:"Lunch",cuisine:"Greek",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:9,c:36,kcal:510,sugar:5,fiber:9},brands:["Beans: any cannellini"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"left whole to simmer, then shredded"},{item:"cannellini or great northern beans",qty:1.5,kind:"can",cat:"pantry",prep:"drained; mash a few for body"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"sliced into coins"},{item:"celery",qty:3,kind:"stalk",cat:"produce",prep:"sliced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"carton (32 oz) low-sodium broth",qty:1,kind:"count",cat:"pantry"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"lemon",qty:1,kind:"count",cat:"produce",prep:"juiced at the end \u2014 fasolada wants that final brightness"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"dried oregano",qty:1.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 low-sodium broth needs it"}],method:["Sweat the onion, carrot, celery, and garlic in the oil with 1 tsp of the salt until sweet, ~8 min; add the oregano for the last 30 seconds.","Add the tomatoes, beans (whole and mashed), chicken, bay, remaining salt, and broth; simmer 25 min, then shred the chicken back in and remove the bay.","Finish with parsley and lemon. Freeze in portions."]},{id:"l-kimchijjigae",name:"Korean Kimchi-jjigae with Turkey",meal:"Lunch",cuisine:"Korean",storage:"Freezer",prep:35,serves:5,macros:{p:76,f:10,c:35,kcal:555,sugar:4,fiber:4},brands:["Kimchi: Jongga","Gochujang: Chung Jung One"],ingredients:[{item:"99% lean ground turkey",qty:1500,kind:"weight",unit:"g",cat:"protein"},{item:"firm tofu",qty:350,kind:"weight",unit:"g",cat:"protein",prep:"cut into \xBE-inch cubes"},{item:"napa cabbage kimchi",qty:400,kind:"weight",unit:"g",cat:"produce",prep:"well-fermented (sour) is BETTER here; chopped, juice reserved"},{item:"gochujang",qty:2,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"minced"},{item:"scallion",qty:1,kind:"bunch",cat:"produce",prep:"sliced, whites and greens separated"},{item:"jasmine rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"toasted sesame oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce",prep:"off the heat at the end"},{item:"low-sodium soy sauce",qty:1,kind:"volume",unit:"tbsp",cat:"sauce",prep:"kimchi and gochujang carry most of the salt"},{item:"gochugaru (Korean chili flakes)",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 scale to your heat"}],method:["Brown the turkey with the scallion whites, garlic, and gochugaru. Push aside and fry the chopped kimchi in the same pot 3\u20134 min \u2014 frying the kimchi first deepens the whole stew.","Add the reserved kimchi juice, gochujang, soy, and 3 cups water; simmer 15 min, then slide in the tofu for the last 5.","Finish with sesame oil and scallion. Freeze; cook rice fresh. (The flavor deepens after freezing.)"]},{id:"l-tinola",name:"Filipino Chicken Tinola",meal:"Lunch",cuisine:"Filipino",storage:"Freezer",prep:40,serves:5,macros:{p:75,f:10,c:20,kcal:460,sugar:4,fiber:4},brands:["Fish sauce: Datu Puti"],ingredients:[{item:"chicken breast",qty:1600,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"chayote",qty:2,kind:"count",cat:"produce",prep:"peeled, cored, cut into wedges (green papaya is the classic swap)"},{item:"bag of fresh spinach",qty:1,kind:"count",cat:"produce",prep:"stands in for chili leaves"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"sliced"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and cut into matchsticks \u2014 ginger leads this soup, so be generous"},{item:"fish sauce",qty:3,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries all the salt"},{item:"vegetable oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"jasmine rice",qty:125,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"black pepper",qty:.5,kind:"volume",unit:"tsp",cat:"spice",prep:"freshly ground"}],method:["Saut\xE9 the ginger, garlic, and onion in the oil until fragrant \u2014 sweating plenty of ginger first is tinola's whole personality. Sear the chicken in the aromatics.","Add 6 cups water, the fish sauce, and pepper; simmer 20 min, then add the chayote and cook 10 more until just tender.","Stir in spinach off the heat. Freeze (add the spinach fresh on reheat if you prefer); serve with rice."]},{id:"d-wildrice",name:"Chicken & Wild Rice Soup",meal:"Dinner",cuisine:"American",storage:"Freezer",prep:45,serves:5,macros:{p:75,f:9,c:36,kcal:520,sugar:4,fiber:4},brands:["Any wild rice blend"],ingredients:[{item:"chicken breast",qty:1500,kind:"weight",unit:"g",cat:"protein",prep:"left whole to simmer, then shredded"},{item:"wild rice blend",qty:150,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"carrot",qty:3,kind:"count",cat:"produce",prep:"diced"},{item:"celery",qty:3,kind:"stalk",cat:"produce",prep:"diced"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"diced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"minced"},{item:"skim milk",qty:200,kind:"volume",unit:"ml",cat:"dairy",prep:"warmed; best stirred in fresh at reheat"},{item:"all-purpose flour",qty:2,kind:"volume",unit:"tbsp",cat:"grains",prep:"to lightly thicken"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"carton (32 oz) low-sodium broth",qty:1,kind:"count",cat:"pantry"},{item:"dried thyme",qty:1.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"bay leaf",qty:2,kind:"count",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 low-sodium broth needs it"}],method:["Saut\xE9 the onion, carrot, celery, and garlic in the oil with 1 tsp of the salt; sprinkle over the flour and thyme and stir 1 min to cook the raw flour taste out.","Add the broth, rice, bay, remaining salt, and chicken; simmer 35 min until the wild rice splits and softens, then shred the chicken back in and remove the bay.","Stir in the skim milk. Freeze (texture is best if you add the milk on reheat instead)."]},{id:"d-chilicolorado",name:"Chili Colorado-Style Chicken",meal:"Dinner",cuisine:"Mexican",storage:"Freezer",prep:50,serves:5,macros:{p:74,f:11,c:30,kcal:520,sugar:3,fiber:4},brands:["Dried chiles: any Mexican grocer"],ingredients:[{item:"chicken breast",qty:1600,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks"},{item:"dried guajillo and ancho chiles",qty:8,kind:"count",cat:"pantry",prep:"stemmed and seeded"},{item:" /* ---- FEEL: density ---- */
.app[data-density="cozy"]{padding:16px 14px 44px;}
.app[data-density="cozy"] .card{padding:14px;border-radius:13px;margin-top:13px;}
.app[data-density="cozy"] .slot{padding:11px 13px;border-radius:10px;}
.app[data-density="cozy"] .slots{gap:8px;}
.app[data-density="cozy"] .rcard{border-radius:11px;margin-bottom:9px;}
.app[data-density="cozy"] .chips{gap:7px;margin-top:13px;}
.app[data-density="cozy"] .gauge{margin-bottom:10px;}
.app[data-density="cozy"] .library{margin-top:22px;}
.app[data-density="airy"]{padding:30px 22px 72px;}
