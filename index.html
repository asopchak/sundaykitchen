ati rice",qty:200,kind:"weight",unit:"g",cat:"grains",prep:"rinsed until the water runs clear"},{item:"nonfat Greek yogurt",qty:500,kind:"weight",unit:"g",cat:"dairy",prep:"for the garlic sauce"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"3 minced for the marinade, 3 finely grated for the sauce"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced \u2014 one for the marinade, one for the sauce"},{item:"large tomato",qty:3,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"cucumber",qty:2,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"medium red onion",qty:1,kind:"count",cat:"produce",prep:"sliced into thin half-moons"},{item:"ground cumin",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"sweet paprika",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground coriander",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground turmeric",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"ground cinnamon",qty:.5,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Whisk the cumin, paprika, coriander, turmeric, and cinnamon with the oil, minced garlic, juice of 1 lemon, and 1\xBD tsp of the salt. Toss with the chicken and marinate 15 min (overnight is even better).","Roast at 220\xB0C/425\xB0F for 16\u201318 min to 74\xB0C/165\xB0F, then rest 5 min before slicing \u2014 resting keeps it juicy.","Cook the rice. Stir the grated garlic into the yogurt with the second lemon's juice and \xBD tsp of the salt \u2014 that's the sauce.","Toss the sliced tomato, cucumber, and onion with the remaining \xBD tsp salt (quick-pickle the onion in a splash of vinegar if you like).","Box rice, sliced chicken, and salad; keep the garlic-yogurt separate and spoon it over when you eat."]},{id:"d-cioppino",name:"Cioppino (Seafood Stew)",meal:"Dinner",cuisine:"Italian-American",storage:"Fresh",prep:45,serves:5,macros:{p:76,f:13,c:16,kcal:485,sugar:5,fiber:3},brands:["Tomatoes: Bianco DiNapoli or San Marzano-style crushed","Wine: any dry white you'd drink"],ingredients:[{item:"cod or other firm white fish",qty:850,kind:"weight",unit:"g",cat:"protein",prep:"cut into 2-inch chunks; pat dry"},{item:"raw shrimp, peeled",qty:650,kind:"weight",unit:"g",cat:"protein",prep:"tails off, patted dry"},{item:"mussels, in shell",qty:1e3,kind:"weight",unit:"g",cat:"protein",prep:"scrubbed, beards pulled; discard any that stay open when tapped"},{item:"canned crushed tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"dry white wine",qty:175,kind:"volume",unit:"ml",cat:"pantry"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"fennel bulb",qty:1,kind:"count",cat:"produce",prep:"cored and thinly sliced; fronds saved for garnish"},{item:"yellow onion",qty:1,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"thinly sliced"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"saffron",qty:.25,kind:"volume",unit:"tsp",cat:"spice",prep:"a generous pinch of threads"},{item:"red pepper flakes",qty:.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 scale to your heat"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 the mussels add brine, so taste before the last \xBD tsp"}],method:["Soften the fennel and onion in the olive oil with 1 tsp of the salt, ~8 min. Add the garlic and pepper flakes and cook 1 min.","Crumble the saffron into the wine \u2014 it blooms better in warm liquid than in oil. Add the wine, reduce by half, then add the tomatoes and 2 cups water with \xBD tsp salt. Simmer 15 min to build the broth.","Cut the cod into big chunks. Add it and the mussels, cover, and cook 4 min.","Add the shrimp and cook 3 min more, until the mussels open and the shrimp are pink (discard any that stay shut).","Finish with parsley. You can make the broth ahead and freeze it, but add the seafood fresh the day you eat it."]},{id:"l-tuna",name:"Tuscan Tuna & White Bean Salad",meal:"Lunch",cuisine:"Italian",storage:"Fresh",prep:12,serves:5,macros:{p:77,f:8,c:28,kcal:520,sugar:2,fiber:9},brands:["Tuna: Wild Planet or Genova yellowfin in water","Beans: Cento cannellini"],ingredients:[{item:"canned tuna in water",qty:11,kind:"can",cat:"protein",prep:"drained well and flaked"},{item:"cannellini beans",qty:2,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"extra-virgin olive oil",qty:5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"celery",qty:3,kind:"stalk",cat:"produce",prep:"finely diced"},{item:"medium red onion",qty:1,kind:"count",cat:"produce",prep:"finely diced; soak 5 min in cold water to tame the bite"},{item:"flat-leaf parsley",qty:1,kind:"bunch",cat:"produce",prep:"chopped"},{item:"capers",qty:5,kind:"volume",unit:"tbsp",cat:"pantry",prep:"drained; roughly chopped if large"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"juiced (zest one first for extra lift)"},{item:"kosher salt",qty:.75,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 capers and tuna are already salty, so taste first"},{item:"black pepper",qty:1,kind:"volume",unit:"tsp",cat:"spice",prep:"coarsely ground"}],method:["Soak the diced onion in cold water while you prep everything else, then drain \u2014 it keeps the salad sweet, not sharp.","Combine tuna, beans, celery, onion, parsley, and capers; dress with the oil, lemon juice and zest, the salt, and the pepper.","Rest 10 min so the beans soak up the dressing. Holds 3\u20134 days and improves overnight."]},{id:"l-tinga",name:"Chicken Tinga Bowl",meal:"Lunch",cuisine:"Mexican",storage:"Freezer",prep:45,serves:5,macros:{p:76,f:10,c:33,kcal:536,sugar:5,fiber:8},brands:["Chipotles: La Coste\xF1a","Tomatoes: Muir Glen Fire-Roasted","Tostadas: Mission"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"trimmed"},{item:"black beans",qty:2,kind:"can",cat:"pantry",prep:"drained and rinsed"},{item:"fire-roasted diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"chipotles in adobo",qty:1,kind:"can",cat:"sauce",prep:"use 2\u20133 chiles + 1 Tbsp adobo; freeze the rest of the can"},{item:"white onion",qty:1,kind:"count",cat:"produce",prep:"half rough-chopped for the sauce, half sliced thin to pickle"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"peeled"},{item:"lime",qty:3,kind:"count",cat:"produce",prep:"1 juiced for pickling, 2 in wedges to serve"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"roughly chopped"},{item:"corn tostadas",qty:5,kind:"count",cat:"grains"},{item:"small green cabbage",qty:1,kind:"count",cat:"produce",prep:"sliced thin"},{item:"ground cumin",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried oregano (Mexican if you have it)",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 adjust to taste"}],method:["Simmer the chicken 12\u201315 min in water with 1\xBD tsp of the salt; reserve a cup of the liquid and shred.","Blend the tomatoes, chipotles and adobo, the chopped onion half, garlic, cumin, and oregano into a smooth sauce.","Simmer the sauce 8\u201310 min, add the chicken, \xBD tsp salt, and a splash of poaching liquid; cook until saucy, then stir in the beans.","Pickle the sliced onion in the lime juice with the remaining \xBD tsp salt while everything cooks.","Portion (it freezes beautifully). Serve over cabbage with a tostada, pickled onion, lime, and cilantro."]},{id:"l-larb",name:"Thai Larb Gai",meal:"Lunch",cuisine:"Thai",storage:"Fridge",prep:25,serves:5,macros:{p:75,f:6,c:37,kcal:530,sugar:2,fiber:3},brands:["Fish sauce: Red Boat 40\xB0N"],ingredients:[{item:"99% lean ground chicken",qty:1650,kind:"weight",unit:"g",cat:"protein"},{item:"jasmine rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"1 Tbsp reserved raw for toasted rice powder"},{item:"fish sauce",qty:5,kind:"volume",unit:"tbsp",cat:"sauce",prep:"carries most of the seasoning"},{item:"lime",qty:4,kind:"count",cat:"produce",prep:"juiced (about \xBD cup)"},{item:"shallot",qty:3,kind:"count",cat:"produce",prep:"sliced paper-thin"},{item:"mint",qty:1,kind:"bunch",cat:"produce",prep:"leaves torn"},{item:"cilantro",qty:1,kind:"bunch",cat:"produce",prep:"roughly chopped"},{item:"red pepper flakes or Thai chili powder",qty:1.5,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 scale to your heat"},{item:"kosher salt",qty:.5,kind:"volume",unit:"tsp",cat:"spice",prep:"for the rice water; the fish sauce seasons the larb"}],method:["Toast the reserved 1 Tbsp raw rice in a dry pan until deeply golden and fragrant, then grind to a coarse powder \u2014 this khao khua is what makes larb taste like larb. Cook the rest of the rice in water with the salt.","Brown the ground chicken in a hot dry pan, breaking it small, until just cooked.","Off the heat, dress with lime juice, fish sauce, sliced shallot, chili, and the toasted rice powder.","Fold in torn mint and cilantro; serve over jasmine rice with cabbage or lettuce."]},{id:"l-greekorzo",name:"Greek Lemon Chicken & Orzo",meal:"Lunch",cuisine:"Greek",storage:"Fridge",prep:30,serves:5,macros:{p:77,f:11,c:40,kcal:570,sugar:3,fiber:4},brands:["Feta: Mt Vikos block feta in brine"],ingredients:[{item:"chicken breast",qty:1450,kind:"weight",unit:"g",cat:"protein",prep:"halved horizontally into even cutlets"},{item:"orzo",qty:225,kind:"weight",unit:"g",cat:"grains"},{item:"frozen chopped spinach",qty:400,kind:"weight",unit:"g",cat:"produce",prep:"no need to thaw"},{item:"feta",qty:75,kind:"weight",unit:"g",cat:"dairy",prep:"crumbled"},{item:"extra-virgin olive oil",qty:1,kind:"volume",unit:"tbsp",cat:"sauce"},{item:"lemon",qty:2,kind:"count",cat:"produce",prep:"zested, then juiced"},{item:"garlic",qty:4,kind:"clove",cat:"produce",prep:"finely grated"},{item:"dried oregano",qty:2,kind:"volume",unit:"  sliced"},{item:"garlic",qty:5,kind:"clove",cat:"produce",prep:"sliced"},{item:"green olives",qty:12,kind:"count",cat:"pantry",prep:"pitted, halved"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"whole-wheat pasta",qty:175,kind:"weight",unit:"g",cat:"grains"},{item:"dried oregano",qty:2,kind:"volume",unit:"tsp",cat:"spice"},{item:"dried basil",qty:1,kind:"volume",unit:"tsp",cat:"spice"},{item:"kosher salt",qty:2,kind:"volume",unit:"tsp",cat:"spice",prep:"baseline \u2014 the olives help, so taste at the end"}],method:["Season the chicken with 1 tsp of the salt; brown hard in the oil and set aside.","Saut\xE9 the mushrooms first, undisturbed, until browned \u2014 they release water, and browning them alone keeps everything from steaming. Add the peppers and onion; then the garlic, oregano, and basil for 30 seconds.","Add the tomatoes, olives, and remaining salt; return the chicken and simmer 25 min. Freeze.","Serve over fresh-cooked pasta."]},{id:"d-keralacurry",name:"Kerala-Style Chicken Coconut Curry",meal:"Dinner",cuisine:"Indian",storage:"Freezer",prep:40,serves:5,macros:{p:74,f:13,c:44,kcal:575,sugar:5,fiber:3},brands:["Coconut milk: Aroy-D Lite"],ingredients:[{item:"chicken breast",qty:1475,kind:"weight",unit:"g",cat:"protein",prep:"cut into 1\xBD-inch pieces"},{item:"light coconut milk",qty:400,kind:"volume",unit:"ml",cat:"pantry",prep:"shaken well"},{item:"canned diced tomatoes",qty:1,kind:"can",cat:"pantry"},{item:"yellow onion",qty:2,kind:"count",cat:"produce",prep:"thinly sliced"},{item:"garlic",qty:6,kind:"clove",cat:"produce",prep:"minced"},{item:"thumb of fresh ginger",qty:1,kind:"count",cat:"produce",prep:"peeled and minced"},{item:"green chili",qty:2,kind:"count",cat:"produce",prep:"slit lengthwise; seeded for less heat"},{item:"extra-virgin olive oil",qty:2.5,kind:"volume",unit:"tsp",cat:"sauce"},{item:"basmati rice",qty:175,kind:"weight",unit:"g",cat:"grains",prep:"rinsed"},{item:"cilantro",qty:1,kind:"bunch",cat
